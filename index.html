<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HIMG Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}

.box {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 15px;
  width: 300px;
  max-width: 95%;
  box-shadow: 0 0 10px #000;
}

.box h3 {
  margin-top: 0;
}

input {
  width: 100%;
  margin-top: 10px;
}

canvas {
  margin-top: 15px;
  border: 1px solid #333;
  max-width: 100%;
  height: auto;
  image-rendering: pixelated;
}

textarea {
  width: 100%;
  height: 120px;
  margin-top: 10px;
  background: #111;
  color: #0f0;
  border: 1px solid #333;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #222;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #333;
}
</style>
</head>
<body>

<h1>HIMG Tool</h1>

<div class="container">

  <div class="box">
    <h3>Open HIMG</h3>
    <input type="file" id="file">
  </div>

  <div class="box">
    <h3>Convert Image → HIMG</h3>
    <input type="file" id="pngInput" accept="image/*">
  </div>

  <div class="box">
    <h3>Preview</h3>
    <canvas id="canvas"></canvas>
  </div>

  <div class="box">
    <h3>HIMG Output</h3>
    <textarea id="output"></textarea>
    <button onclick="downloadHIMG()">Download .himg</button>
  </div>

</div>

<script>
function fitCanvas(canvas, width, height) {
  const maxSize = 500;

  if (width > maxSize || height > maxSize) {
    const scale = Math.min(maxSize / width, maxSize / height);
    canvas.style.width = width * scale + "px";
    canvas.style.height = height * scale + "px";
  } else {
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
  }
}

function renderHIMG(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l);

  if (lines[0] !== "HIMG") {
    alert("Invalid HIMG file");
    return;
  }

  const [width, height] = lines[1].split(" ").map(Number);
  const data = lines.slice(2);

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = width;
  canvas.height = height;

  fitCanvas(canvas, width, height);

  let y = 0;

  data.forEach(row => {
    const cols = row.split(" ");
    let x = 0;

    cols.forEach(hex => {
      const r = parseInt(hex.substring(0,2), 16);
      const g = parseInt(hex.substring(2,4), 16);
      const b = parseInt(hex.substring(4,6), 16);

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x, y, 1, 1);

      x++;
    });

    y++;
  });
}

document.getElementById("file").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    renderHIMG(reader.result);
    document.getElementById("output").value = reader.result;
  };

  reader.readAsText(file);
});

document.getElementById("pngInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const img = new Image();

  img.onload = function() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    fitCanvas(canvas, img.width, img.height);

    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, img.width, img.height).data;

    let output = "HIMG\n";
    output += img.width + " " + img.height + "\n";

    let i = 0;

    for (let y = 0; y < img.height; y++) {
      let row = [];

      for (let x = 0; x < img.width; x++) {
        const r = data[i++];
        const g = data[i++];
        const b = data[i++];
        i++;

        row.push(
          r.toString(16).padStart(2, "0").toUpperCase() +
          g.toString(16).padStart(2, "0").toUpperCase() +
          b.toString(16).padStart(2, "0").toUpperCase()
        );
      }

      output += row.join(" ") + "\n";
    }

    document.getElementById("output").value = output;
  };

  img.src = URL.createObjectURL(file);
});

function downloadHIMG() {
  const text = document.getElementById("output").value;

  const blob = new Blob([text], { type: "application/x-himg" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "image.himg";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("file");

if (fileUrl) {
  fetch(fileUrl)
    .then(res => res.text())
    .then(text => {
      renderHIMG(text);
      document.getElementById("output").value = text;
    });
}
</script>

</body>
</html>
