<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIMG Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

h1 {
  text-align: center;
  padding: 10px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}

.box {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 15px;
  width: 320px;
  max-width: 95%;
  box-shadow: 0 0 10px #000;
}

.box h3 {
  margin-top: 0;
}

input {
  width: 100%;
  margin-top: 10px;
}

.preview-box {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  border-radius: 8px;
  height: 320px;
  overflow: hidden;
}

canvas {
  image-rendering: pixelated;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #2a2a2a;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  display: none;
}

button:hover {
  background: #3a3a3a;
}
</style>
</head>
<body>

<h1>HIMG Tool</h1>

<div class="container">

  <div class="box">
    <h3>Open HIMG / HIMGC</h3>
    <input type="file" id="file">
  </div>

  <div class="box">
    <h3>Convert Image → HIMG</h3>
    <input type="file" id="pngInput" accept="image/*">
  </div>

  <div class="box">
    <h3>Preview</h3>
    <div class="preview-box">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div class="box">
    <h3>Download</h3>
    <button id="downloadBtn" onclick="downloadHIMG()">Download .himg</button>
    <button id="downloadCBtn" onclick="downloadHIMGC()">Download .himgc</button>
  </div>

</div>

<script>
let currentHIMG = "";

function fitCanvas(canvas, width, height) {
  const maxSize = 300;
  let scale = Math.min(maxSize / width, maxSize / height, 1);
  canvas.style.width = width * scale + "px";
  canvas.style.height = height * scale + "px";
}

function renderHIMG(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l);

  if (lines[0] !== "HIMG") {
    alert("Invalid HIMG file");
    return;
  }

  currentHIMG = text;

  document.getElementById("downloadBtn").style.display = "block";
  document.getElementById("downloadCBtn").style.display = "block";

  const [width, height] = lines[1].split(" ").map(Number);
  const data = lines.slice(2);

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = width;
  canvas.height = height;

  fitCanvas(canvas, width, height);

  let y = 0;

  data.forEach(row => {
    const cols = row.split(" ");
    let x = 0;

    cols.forEach(hex => {
      const r = parseInt(hex.substring(0,2), 16);
      const g = parseInt(hex.substring(2,4), 16);
      const b = parseInt(hex.substring(4,6), 16);

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x, y, 1, 1);

      x++;
    });

    y++;
  });
}

document.getElementById("file").addEventListener("change", async function(e) {
  const file = e.target.files[0];

  if (file.name.endsWith(".himgc")) {
    const text = await decompressHIMGC(file);
    renderHIMG(text);
  } else {
    const reader = new FileReader();
    reader.onload = () => renderHIMG(reader.result);
    reader.readAsText(file);
  }
});

document.getElementById("pngInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const img = new Image();

  img.onload = function() {
    const dataCanvas = document.createElement("canvas");
    const dataCtx = dataCanvas.getContext("2d");

    dataCanvas.width = img.width;
    dataCanvas.height = img.height;

    dataCtx.drawImage(img, 0, 0);

    const data = dataCtx.getImageData(0, 0, img.width, img.height).data;

    let output = "HIMG\n";
    output += img.width + " " + img.height + "\n";

    let i = 0;

    for (let y = 0; y < img.height; y++) {
      let row = [];

      for (let x = 0; x < img.width; x++) {
        const r = data[i++];
        const g = data[i++];
        const b = data[i++];
        i++;

        row.push(
          r.toString(16).padStart(2, "0").toUpperCase() +
          g.toString(16).padStart(2, "0").toUpperCase() +
          b.toString(16).padStart(2, "0").toUpperCase()
        );
      }

      output += row.join(" ") + "\n";
    }

    currentHIMG = output;

    document.getElementById("downloadBtn").style.display = "block";
    document.getElementById("downloadCBtn").style.display = "block";

    const canvas = document.getElementById("canvas");
    canvas.width = 0;
    canvas.height = 0;
  };

  img.src = URL.createObjectURL(file);
});

function downloadHIMG() {
  const blob = new Blob([currentHIMG], { type: "application/x-himg" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "image.himg";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function downloadHIMGC() {
  const blob = await compressHIMG(currentHIMG);

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "image.himgc";

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function compressHIMG(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);

  const compressed = await new Response(
    new Blob([data]).stream().pipeThrough(new CompressionStream("gzip"))
  ).arrayBuffer();

  return new Blob([compressed], { type: "application/x-himgc" });
}

async function decompressHIMGC(file) {
  const stream = file.stream().pipeThrough(new DecompressionStream("gzip"));
  return await new Response(stream).text();
}

const params = new URLSearchParams(window.location.search);
const fileUrl = params.get("file");

if (fileUrl) {
  fetch(fileUrl)
    .then(res => res.text())
    .then(text => renderHIMG(text));
}
</script>

</body>
</html>
