<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HIMG Viewer</title>

<style>
body {
  background: #0f0f0f;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

canvas {
  margin-top: 20px;
  image-rendering: pixelated;
  border: 1px solid #333;
}

input {
  margin-top: 15px;
}

</style>
</head>
<body>

<h1>HIMG Viewer</h1>
<p>Select a .himg file</p>

<input type="file" id="file">

<br>
<canvas id="canvas"></canvas>

<script>
document.getElementById("file").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function() {
    const lines = reader.result.split("\n").map(l => l.trim()).filter(l => l);

    if (lines[0] !== "HIMG") {
      alert("Invalid HIMG file");
      return;
    }

    const [width, height] = lines[1].split(" ").map(Number);
    const data = lines.slice(2);

    const scale = 1; // change to 2, 4, etc for zoom

    const canvas = document.getElementById("canvas");
    canvas.width = width * scale;
    canvas.height = height * scale;

    const ctx = canvas.getContext("2d");

    let y = 0;

    data.forEach(row => {
      const cols = row.split(" ");
      let x = 0;

      cols.forEach(hex => {
        const r = parseInt(hex.substring(0,2), 16);
        const g = parseInt(hex.substring(2,4), 16);
        const b = parseInt(hex.substring(4,6), 16);

        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x * scale, y * scale, scale, scale);

        x++;
      });

      y++;
    });

  };

  reader.readAsText(file);
});
</script>

</body>
</html>
